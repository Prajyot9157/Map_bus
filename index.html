
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>मराठी बस ट्रॅकर</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* ===== All existing styles stay exactly the same ===== */
        :root {
            --primary: #2979ff;
            --primary-dark: #1565c0;
            --primary-light: #e3f2fd;
            --surface: #1e1e24;
            --background: #121214;
            --green: #00e676;
            --green-light: rgba(0, 230, 118, 0.15);
            --orange: #ff9100;
            --orange-light: rgba(255, 145, 0, 0.15);
            --red: #ff1744;
            --grey: #b0bec5;
            --text: #ffffff;
            --text-secondary: #cfd8dc;
            --border: #37474f;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.5);
            --radius: 20px;
            --radius-sm: 12px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: calc(var(--safe-bottom) + 110px);
        }

        .header {
            background: var(--surface);
            padding: 14px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: var(--shadow);
        }
        .header .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .logo {
            font-size: 28px;
        }
        .header .title h1 {
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: 800;
            color: #ffd600;
        }
        .header .title p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .shift-toggle {
            display: flex;
            background: #263238;
            border-radius: 30px;
            padding: 4px;
            border: 1px solid var(--border);
        }
        .shift-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            background: transparent;
            color: var(--grey);
            font-size: clamp(0.75rem, 3vw, 0.8rem);
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .shift-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow);
        }

        .summary-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 16px;
        }
        .summary-card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 12px 8px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 2px solid var(--border);
        }
        .summary-card .value {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            font-weight: 900;
            line-height: 1;
        }
        .summary-card .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: bold;
            margin-top: 6px;
        }
        .summary-card.total .value {
            color: #ffd600;
        }
        .summary-card.done .value {
            color: var(--green);
        }
        .summary-card.left .value {
            color: var(--orange);
        }

        .map-container {
            margin: 0 16px 16px;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            height: 40vh;
            min-height: 260px;
            position: relative;
            border: 3px solid var(--border);
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .map-overlay-btns {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .map-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--border);
            box-shadow: var(--shadow);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }
        .map-btn:active {
            transform: scale(0.9);
            background: #263238;
        }

        .gps-status {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(30, 30, 36, 0.95);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: clamp(0.75rem, 3vw, 0.85rem);
            font-weight: bold;
            box-shadow: var(--shadow);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--grey);
            flex-shrink: 0;
        }
        .dot.active {
            background: var(--green);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.5);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(0, 230, 118, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
            }
        }

        /* Backup & Sync section */
        .backup-section {
            margin: 0 16px 16px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px 16px 14px;
            border: 2px solid var(--border);
            box-shadow: var(--shadow);
        }
        .backup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .backup-header .title {
            font-weight: 800;
            font-size: clamp(0.95rem, 3.5vw, 1.1rem);
            color: #ffd600;
        }
        .backup-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: #263238;
            color: var(--grey);
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .backup-status.success {
            color: var(--green);
            border-color: var(--green);
        }
        .backup-status.error {
            color: #ff5252;
            border-color: #ff5252;
        }
        .backup-status.syncing {
            color: #ffd600;
            border-color: #ffd600;
            animation: pulseText 1s infinite alternate;
        }
        .backup-status.cloud {
            color: #82b1ff;
            border-color: #82b1ff;
        }
        @keyframes pulseText {
            0% {
                opacity: 0.6;
            }
            100% {
                opacity: 1;
            }
        }

        .backup-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .backup-btn {
            flex: 1 0 auto;
            min-width: 70px;
            padding: 10px 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            background: #263238;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .backup-btn:active {
            transform: scale(0.95);
        }
        .backup-btn.export-btn {
            background: rgba(255, 214, 0, 0.12);
            color: #ffd600;
            border-color: rgba(255, 214, 0, 0.3);
        }
        .backup-btn.export-btn:active {
            background: rgba(255, 214, 0, 0.25);
        }
        .backup-btn.import-btn {
            background: rgba(41, 121, 255, 0.12);
            color: #82b1ff;
            border-color: rgba(41, 121, 255, 0.3);
        }
        .backup-btn.import-btn:active {
            background: rgba(41, 121, 255, 0.25);
        }
        .backup-btn.cloud-btn {
            background: rgba(0, 230, 118, 0.10);
            color: var(--green);
            border-color: rgba(0, 230, 118, 0.25);
        }
        .backup-btn.cloud-btn:active {
            background: rgba(0, 230, 118, 0.20);
        }
        .backup-btn.sync-btn {
            background: rgba(255, 152, 0, 0.12);
            color: #ffb74d;
            border-color: rgba(255, 152, 0, 0.25);
        }
        .backup-btn.sync-btn:active {
            background: rgba(255, 152, 0, 0.25);
        }
        .backup-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        #importInput {
            display: none;
        }

        .list-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 10px;
        }
        .list-header {
            font-weight: 800;
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: #ffd600;
        }
        .reset-btn-manual {
            background: #263238;
            color: #ff5252;
            border: 1px solid #ff5252;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }

        .stops-list {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .stop-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            border: 2px solid var(--border);
            border-left: 10px solid var(--orange);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: all 0.25s;
        }

        .stop-card.active-next {
            border-color: #ffd600;
            border-left: 10px solid #ffd600;
            background: #263238;
            animation: cardPulse 3s infinite alternate;
        }
        @keyframes cardPulse {
            0% {
                box-shadow: 0 4px 12px rgba(255, 214, 0, 0.1);
            }
            100% {
                box-shadow: 0 4px 20px rgba(255, 214, 0, 0.3);
            }
        }

        .stop-card.done {
            border-color: rgba(0, 230, 118, 0.3);
            border-left: 10px solid var(--green);
            background: var(--green-light);
        }

        .stop-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }
        .stop-name-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
        }
        .stop-name-left {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .stop-badge {
            background: var(--border);
            color: #ffd600;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.9rem;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .stop-card.done .stop-badge {
            background: var(--green);
            color: black;
        }

        .stop-name {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            font-weight: 800;
            color: white;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.2;
        }
        .stop-card.done .stop-name {
            text-decoration: line-through;
            color: var(--grey);
        }

        .stop-details {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .dist-badge {
            background: rgba(41, 121, 255, 0.2);
            color: #82b1ff;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: bold;
        }
        .stop-card.done .dist-badge {
            display: none;
        }

        .stop-action-btns {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .call-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #37474f;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #81d4fa;
            cursor: pointer;
            text-decoration: none;
            flex-shrink: 0;
        }
        .call-btn:active {
            background: #455a64;
        }

        .dir-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: white;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }
        .dir-btn:active {
            background: var(--primary-dark);
        }

        .tick-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--green);
            color: black;
            font-size: 1.8rem;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 230, 118, 0.4);
            flex-shrink: 0;
        }
        .tick-btn:active {
            transform: scale(0.9);
        }

        .already-done-check {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--green);
        }

        .del-field-btn {
            background: rgba(255, 23, 68, 0.15);
            border: 1px solid rgba(255, 23, 68, 0.4);
            color: #ff5252;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .del-field-btn:active {
            background: #ff1744;
            color: white;
        }

        .fab {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 20px);
            right: 20px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #ffd600;
            color: black;
            font-size: 2.5rem;
            font-weight: bold;
            border: none;
            box-shadow: 0 6px 18px rgba(255, 214, 0, 0.4);
            z-index: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fab:active {
            transform: scale(0.9);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 99999;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-sheet {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            border-radius: 30px 30px 0 0;
            padding: 24px 20px calc(var(--safe-bottom) + 24px);
            animation: slideUp 0.3s ease-out forwards;
            border-top: 4px solid var(--primary);
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #ffd600;
            font-weight: 800;
            text-align: center;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 2px solid var(--border);
            font-size: 1.1rem;
            outline: none;
            background: #263238;
            color: white;
            font-family: inherit;
        }
        .form-input:focus {
            border-color: var(--primary);
        }

        .fetch-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            background: rgba(41, 121, 255, 0.15);
            color: #82b1ff;
            border: 2px dashed var(--primary);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .fetch-btn.success {
            background: var(--green-light);
            border-color: var(--green);
            color: var(--green);
            border-style: solid;
        }

        .modal-actions {
            display: flex;
            gap: 14px;
            margin-top: 28px;
        }
        .btn-cancel {
            background: #37474f;
            color: white;
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .btn-save {
            background: var(--primary);
            color: white;
            flex: 2;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffd600;
            color: black;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 1rem;
            z-index: 100000;
            font-weight: 800;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            animation: fadeInOut 2.8s forwards;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            width: max-content;
            max-width: 90vw;
        }
        .toast.error {
            background: #ff5252;
            color: white;
        }
        .toast.success {
            background: var(--green);
            color: black;
        }
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                top: 0;
            }
            15% {
                opacity: 1;
                top: 24px;
            }
            85% {
                opacity: 1;
                top: 24px;
            }
            100% {
                opacity: 0;
                top: 0;
            }
        }

        @media (max-width: 480px) {
            .backup-actions .backup-btn {
                flex: 1 0 calc(50% - 4px);
                font-size: 0.65rem;
                padding: 8px 4px;
            }
            .backup-btn .btn-label {
                display: none;
            }
            .backup-btn .btn-icon {
                font-size: 1.2rem;
            }
            .stop-action-btns .call-btn,
            .stop-action-btns .dir-btn {
                width: 44px;
                height: 44px;
                font-size: 1.2rem;
            }
            .stop-action-btns .tick-btn {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
        }
        @media (min-width: 481px) {
            .backup-btn .btn-icon {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="logo-area">
            <div class="logo">🏫</div>
            <div class="title">
                <h1>स्कूल बस ट्रॅकर</h1>
                <p id="liveDate">दिनांक लोड होत आहे...</p>
            </div>
        </div>
        <div class="shift-toggle">
            <button class="shift-btn active" id="btnMorning" onclick="setShift('morning')">☀️ सकाळ</button>
            <button class="shift-btn" id="btnAfternoon" onclick="setShift('afternoon')">🌙 दुपार</button>
        </div>
    </header>

    <!-- ===== SUMMARY ===== -->
    <div class="summary-row">
        <div class="summary-card total">
            <div class="value" id="countTotal">0</div>
            <div class="label">एकूण थांबे</div>
        </div>
        <div class="summary-card done">
            <div class="value" id="countDone">0</div>
            <div class="label">पूर्ण झाले</div>
        </div>
        <div class="summary-card left">
            <div class="value" id="countLeft">0</div>
            <div class="label">उरलेले</div>
        </div>
    </div>

    <!-- ===== MAP ===== -->
    <div class="map-container">
        <div id="map"></div>
        <div class="map-overlay-btns">
            <button class="map-btn" onclick="recenterMap()" title="माझी जागा">📍</button>
            <button class="map-btn" onclick="zoomToAll()" title="पूर्ण मार्ग">🔍</button>
        </div>
        <div class="gps-status">
            <div class="dot" id="gpsIndicator"></div>
            <span id="gpsText">जीपीएस (GPS) शोधत आहे...</span>
        </div>
    </div>

    <!-- ===== BACKUP & SYNC SECTION (NEW: added Sync button) ===== -->
    <div class="backup-section" id="backupSection">
        <div class="backup-header">
            <span class="title">📦 डेटा व्यवस्थापन</span>
            <span class="backup-status" id="backupStatus">✅ सर्व व्यवस्थित</span>
        </div>
        <div class="backup-actions">
            <button class="backup-btn export-btn" onclick="exportBackup()">
                <span class="btn-icon">📤</span><span class="btn-label">बॅकअप</span>
            </button>
            <button class="backup-btn import-btn" onclick="document.getElementById('importInput').click()">
                <span class="btn-icon">📥</span><span class="btn-label">आणा</span>
            </button>
            <button class="backup-btn cloud-btn" id="cloudUploadBtn" onclick="uploadToBackend()">
                <span class="btn-icon">☁️⬆</span><span class="btn-label">अपलोड</span>
            </button>
            <!-- NEW: Sync from Cloud button -->
            <button class="backup-btn sync-btn" id="syncBtn" onclick="syncFromCloud()">
                <span class="btn-icon">🔄</span><span class="btn-label">सिंक करा</span>
            </button>
            <input type="file" id="importInput" accept=".json" onchange="importBackup(event)">
        </div>
    </div>

    <!-- ===== STOPS LIST ===== -->
    <div class="list-header-row">
        <div class="list-header" id="listTitleLabel">सकाळचे थांबे (घरून शाळा):</div>
        <button class="reset-btn-manual" onclick="confirmManualReset()">🔄 रीसेट करा</button>
    </div>
    <div class="stops-list" id="stopsList"></div>

    <!-- ===== FAB ===== -->
    <button class="fab" onclick="openModal()" title="नवीन थांबा जोडा">+</button>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-sheet">
            <h2 class="modal-title">नवीन थांबा जोडा 📍</h2>
            <div class="form-group">
                <label>विद्यार्थ्यांचे / थांब्याचे नाव लिहा *</label>
                <input type="text" id="stopNameInput" class="form-input" placeholder="उदा. राहुल शिंदे, पिंपरी" required>
            </div>
            <div class="form-group">
                <label>पालकांचा मोबाईल नंबर (ऐच्छिक)</label>
                <input type="tel" id="stopPhoneInput" class="form-input" placeholder="उदा. 98XXXXXXXX">
            </div>
            <div class="form-group">
                <label>थांब्याची जागा (Location) सेट करा</label>
                <p style="font-size: 0.8rem; color: var(--grey); margin-bottom: 8px;">
                    * टीप: या थांब्याच्या ठिकाणी उभे राहून खालील बटण दाबा.
                </p>
                <button type="button" id="btnFetchLocation" class="fetch-btn" onclick="fetchAndSaveTempLocation()">
                    📍 माझी चालू जागा इथेच सेट करा
                </button>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal()">मागे होई</button>
                <button type="button" class="btn-save" onclick="saveNewStop()">✅ थांबा सेव्ह करा</button>
            </div>
        </div>
    </div>

    <!-- ===== Leaflet JS ===== -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- ===== FIREBASE SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>

    <script>
        // ================================================================
        //  FIREBASE INIT
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD9RuHVEVYey9YaRDJVDOo5A6iZxolHP2U",
            authDomain: "busroute-859b9.firebaseapp.com",
            projectId: "busroute-859b9",
            storageBucket: "busroute-859b9.firebasestorage.app",
            messagingSenderId: "244090789044",
            appId: "1:244090789044:web:df984f47e7445f114f0be1",
            measurementId: "G-T1XWZH79G3"
        };

        let firebaseApp = null;
        let firestore = null;
        let firebaseInitialized = false;
        let firebaseInitError = null;

        try {
            firebaseApp = firebase.initializeApp(firebaseConfig);
            firestore = firebase.firestore();
            firestore.enablePersistence({ synchronizeTabs: true })
                .catch(function(err) {
                    console.warn('Firestore persistence warning:', err);
                });
            firebaseInitialized = true;
            console.log('✅ Firebase initialized.');
        } catch (e) {
            console.error('❌ Firebase init failed:', e);
            firebaseInitialized = false;
            firebaseInitError = e.message;
        }

        // ================================================================
        //  STATE & CORE LOGIC (unchanged)
        // ================================================================
        const STATE = {
            stops: [],
            driverPos: null,
            tempCoords: null,
            currentShift: 'morning',
            map: null,
            markerLayer: null,
            driverMarker: null,
            routeLine: null
        };

        function initApp() {
            const saved = localStorage.getItem('schoolBusStopsData');
            if (saved) {
                try { STATE.stops = JSON.parse(saved); } catch (e) { STATE.stops = []; }
            }
            const savedShift = localStorage.getItem('schoolBusShift');
            if (savedShift) {
                STATE.currentShift = savedShift;
                setShiftUI(savedShift);
            }
            const now = new Date();
            const dateStr = now.toLocaleDateString('mr-IN', { weekday: 'long', day: 'numeric', month: 'long',
                    year: 'numeric' });
            document.getElementById('liveDate').textContent = dateStr;
            checkDailyReset();
            initMap();
            startGPS();
            updateUI();

            // Run migration & then auto-sync from cloud
            runMigration().then(() => {
                // After migration check, attempt to sync from cloud if Firebase is available
                if (firebaseInitialized) {
                    autoSyncFromCloud();
                }
            }).catch(() => {
                // Migration failed or errored — still try to sync
                if (firebaseInitialized) {
                    autoSyncFromCloud();
                }
            });
        }

        function checkDailyReset() {
            const todayKey = new Date().toDateString();
            const lastSavedDate = localStorage.getItem('lastOpenedDate');
            if (lastSavedDate && lastSavedDate !== todayKey) {
                if (STATE.stops.length > 0) {
                    STATE.stops.forEach(stop => { stop.status = 'pending'; });
                    saveData();
                    showToast("🌅 शुभ सकाळ! आजचे सर्व थांबे आपोआप रीसेट झाले आहेत.");
                }
            }
            localStorage.setItem('lastOpenedDate', todayKey);
        }

        function confirmManualReset() {
            if (confirm("तुम्हाला आजचे सर्व थांबे पुन्हा सुरूवातीपासून (Pending) करायचे आहेत का?")) {
                STATE.stops.forEach(stop => { stop.status = 'pending'; });
                saveData();
                updateUI();
                showToast("🔄 सर्व थांबे यशस्वीरित्या रीसेट झाले!");
            }
        }

        function setShift(shiftMode) {
            STATE.currentShift = shiftMode;
            localStorage.setItem('schoolBusShift', shiftMode);
            setShiftUI(shiftMode);
            updateUI();
            showToast(shiftMode === 'morning' ? "☀️ सकाळची शिफ्ट निवडली" : "🌙 दुपारची शिफ्ट निवडली");
        }

        function setShiftUI(shiftMode) {
            const morningBtn = document.getElementById('btnMorning');
            const afternoonBtn = document.getElementById('btnAfternoon');
            const label = document.getElementById('listTitleLabel');
            if (shiftMode === 'morning') {
                morningBtn.classList.add('active');
                afternoonBtn.classList.remove('active');
                label.textContent = "सकाळचे थांबे (घरून शाळा):";
            } else {
                afternoonBtn.classList.add('active');
                morningBtn.classList.remove('active');
                label.textContent = "दुपारचे थांबे (शाळेतून घरी):";
            }
        }

        // --- Map ---
        function initMap() {
            STATE.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([18.6279, 73.8009],
            13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(STATE.map);
            STATE.markerLayer = L.layerGroup().addTo(STATE.map);
        }

        function updateMapElements() {
            if (!STATE.map) return;
            STATE.markerLayer.clearLayers();
            if (STATE.routeLine) {
                STATE.map.removeLayer(STATE.routeLine);
                STATE.routeLine = null;
            }
            const points = [];
            if (STATE.driverPos) {
                points.push([STATE.driverPos.lat, STATE.driverPos.lng]);
                L.circle([STATE.driverPos.lat, STATE.driverPos.lng], {
                    radius: 30,
                    color: '#2979ff',
                    fillColor: '#2979ff',
                    fillOpacity: 0.2,
                    weight: 1
                }).addTo(STATE.markerLayer);
                STATE.driverMarker = L.circleMarker([STATE.driverPos.lat, STATE.driverPos.lng], {
                    radius: 9,
                    color: 'white',
                    weight: 3,
                    fillColor: '#2979ff',
                    fillOpacity: 1
                }).addTo(STATE.markerLayer);
            }
            const displayStops = [...STATE.stops];
            if (STATE.currentShift === 'afternoon') displayStops.reverse();
            displayStops.forEach((stop, i) => {
                const isDone = stop.status === 'completed';
                const color = isDone ? '#9aa0a6' : (i === getNextPendingIndex(displayStops) ? '#ffd600' :
                '#ff9100');
                const iconHtml =
                    `<div style="background:${color};color:black;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;border:2px solid white;box-shadow:0 3px 6px rgba(0,0,0,0.4);font-size:0.9rem">${i+1}</div>`;
                const icon = L.divIcon({ className: '', html: iconHtml, iconSize: [30, 30], iconAnchor: [15,
                    15] });
                L.marker([stop.coords.lat, stop.coords.lng], { icon: icon })
                    .addTo(STATE.markerLayer)
                    .bindPopup(`<b>${stop.name}</b><br>${isDone ? 'झाला ✔' : 'बाकी ⏳'}`);
                if (!isDone) points.push([stop.coords.lat, stop.coords.lng]);
            });
            if (points.length > 1) {
                STATE.routeLine = L.polyline(points, { color: '#ffd600', weight: 5, dashArray: '8, 8',
                        opacity: 0.8 }).addTo(STATE.map);
            }
        }

        function getNextPendingIndex(orderedList) {
            return orderedList.findIndex(s => s.status === 'pending');
        }

        function recenterMap() {
            if (STATE.driverPos && STATE.map) {
                STATE.map.setView([STATE.driverPos.lat, STATE.driverPos.lng], 16);
            } else {
                showToast("जीपीएस सिग्नल मिळेपर्यंत थांबा...");
            }
        }

        function zoomToAll() {
            if (!STATE.map || STATE.stops.length === 0) return;
            const bounds = [];
            if (STATE.driverPos) bounds.push([STATE.driverPos.lat, STATE.driverPos.lng]);
            STATE.stops.forEach(s => bounds.push([s.coords.lat, s.coords.lng]));
            if (bounds.length > 0) STATE.map.fitBounds(bounds, { padding: [40, 40] });
        }

        // --- GPS ---
        function startGPS() {
            const ind = document.getElementById('gpsIndicator');
            const txt = document.getElementById('gpsText');
            if (!navigator.geolocation) {
                txt.textContent = "मोबाईलमध्ये GPS सपोर्ट नाही.";
                return;
            }
            navigator.geolocation.watchPosition(
                (pos) => {
                    STATE.driverPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    ind.className = 'dot active';
                    txt.textContent = "जीपीएस कनेक्टेड 🟢";
                    updateMapElements();
                    updateListDistances();
                },
                (err) => {
                    ind.className = 'dot';
                    let errorMsg = "GPS बंद आहे! कृपया Location चालू करा 🔴";
                    if (err.code === 1) errorMsg = "GPS परमिशन नाकारली! 🔴";
                    txt.textContent = errorMsg;
                }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
            );
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(
                dLon / 2) ** 2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const d = R * c;
            return d < 1 ? Math.round(d * 1000) + ' मी' : d.toFixed(1) + ' किमी';
        }

        // --- UI rendering ---
        function updateUI() {
            const total = STATE.stops.length;
            const done = STATE.stops.filter(s => s.status === 'completed').length;
            document.getElementById('countTotal').textContent = total;
            document.getElementById('countDone').textContent = done;
            document.getElementById('countLeft').textContent = total - done;

            const listDiv = document.getElementById('stopsList');
            listDiv.innerHTML = '';
            if (total === 0) {
                listDiv.innerHTML =
                    `<div style="text-align:center; padding:40px 20px; color:var(--grey); background:var(--surface); border-radius:var(--radius); border:2px dashed var(--border);">
                        <p style="font-size:1.2rem; font-weight:bold; margin-bottom:8px;">एकूण शून्य थांबे</p>
                        <p style="font-size:0.9rem;">नवीन थांबा जोडण्यासाठी खालील पिवळे (+) बटण दाबा.</p>
                    </div>`;
                updateMapElements();
                return;
            }

            const displayStops = [...STATE.stops];
            if (STATE.currentShift === 'afternoon') displayStops.reverse();
            const nextPendingIndex = getNextPendingIndex(displayStops);

            displayStops.forEach((stop, index) => {
                const isDone = stop.status === 'completed';
                const isNext = (index === nextPendingIndex);
                const distStr = (STATE.driverPos && !isDone) ?
                    calcDist(STATE.driverPos.lat, STATE.driverPos.lng, stop.coords.lat, stop.coords.lng) :
                    '--';
                const card = document.createElement('div');
                card.className = `stop-card ${isDone ? 'done' : ''} ${isNext ? 'active-next' : ''}`;
                const travelIcon = STATE.currentShift === 'morning' ? '🏠 ➔ 🏫' : '🏫 ➔ 🏠';

                let actionBtnHTML = '';
                if (!isDone) {
                    actionBtnHTML = `
                        <div class="stop-action-btns">
                            ${stop.phone ? `<a href="tel:${stop.phone}" class="call-btn">📞</a>` : ''}
                            <button class="dir-btn" onclick="openNavMap(${stop.coords.lat}, ${stop.coords.lng})">🧭</button>
                            <button class="tick-btn" onclick="markDone('${stop.id}')">✔</button>
                        </div>
                    `;
                } else {
                    actionBtnHTML =
                        `<div class="stop-action-btns"><div class="already-done-check">✔</div></div>`;
                }

                card.innerHTML = `
                    <div class="stop-info">
                        <div class="stop-name-row">
                            <div class="stop-name-left">
                                <div class="stop-badge">${index + 1}</div>
                                <div class="stop-name">${stop.name}</div>
                            </div>
                            <button class="del-field-btn" onclick="deleteStop('${stop.id}')">🗑️ काढा</button>
                        </div>
                        <div class="stop-details">
                            <span class="dist-badge class-dist" data-lat="${stop.coords.lat}" data-lng="${stop.coords.lng}">
                                📍 ${distStr} लांब
                            </span>
                            <span style="color:var(--grey); font-weight:bold; font-size:0.8rem;">${travelIcon}</span>
                        </div>
                    </div>
                    ${actionBtnHTML}
                `;
                listDiv.appendChild(card);
            });
            updateMapElements();
        }

        function updateListDistances() {
            if (!STATE.driverPos) return;
            document.querySelectorAll('.class-dist').forEach(el => {
                const lat = parseFloat(el.getAttribute('data-lat'));
                const lng = parseFloat(el.getAttribute('data-lng'));
                el.textContent = `📍 ${calcDist(STATE.driverPos.lat, STATE.driverPos.lng, lat, lng)} लांब`;
            });
        }

        function openNavMap(lat, lng) {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`,
            '_blank');
        }

        function markDone(id) {
            const stop = STATE.stops.find(s => s.id === id);
            if (stop) {
                stop.status = 'completed';
                saveData();
                updateUI();
                showToast(`मस्त! ${stop.name} थांबा पूर्ण झाला.`);
            }
        }

        function deleteStop(id) {
            const stop = STATE.stops.find(s => s.id === id);
            const stopName = stop ? stop.name : "हा थांबा";
            if (confirm(`तुम्हाला नक्की '${stopName}' या विद्यार्थ्याचा थांबा पूर्णपणे काढून टाकायचा आहे का?`)) {
                STATE.stops = STATE.stops.filter(s => s.id !== id);
                saveData();
                updateUI();
                showToast("थांबा यशस्वीरित्या काढून टाकला.");
            }
        }

        function openModal() {
            document.getElementById('stopNameInput').value = '';
            document.getElementById('stopPhoneInput').value = '';
            STATE.tempCoords = null;
            const btn = document.getElementById('btnFetchLocation');
            btn.className = 'fetch-btn';
            btn.innerHTML = '📍 माझी चालू जागा इथेच सेट करा';
            document.getElementById('addModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('addModal').style.display = 'none';
        }

        function fetchAndSaveTempLocation() {
            if (!STATE.driverPos) {
                showToast('थांबा! अजून जीपीएस लोकेशन मिळाले नाही.');
                return;
            }
            STATE.tempCoords = { ...STATE.driverPos };
            const btn = document.getElementById('btnFetchLocation');
            btn.className = 'fetch-btn success';
            btn.innerHTML = '✅ जागा यशस्वीरित्या सेट झाली!';
            showToast('तुम्ही उभे असलेली जागा रेकॉर्ड केली आहे.');
        }

        function saveNewStop() {
            const name = document.getElementById('stopNameInput').value.trim();
            const phone = document.getElementById('stopPhoneInput').value.trim();
            if (!name) { showToast('कृपया विद्यार्थ्याचे किंवा थांब्याचे नाव लिहा!'); return; }
            if (!STATE.tempCoords) { showToast('कृपया "माझी चालू जागा सेट करा" वर क्लिक करा!'); return; }
            const uniqueId = Date.now().toString() + Math.random().toString(36).substring(2, 9);
            const newStop = {
                id: uniqueId,
                name: name,
                phone: phone,
                coords: STATE.tempCoords,
                status: 'pending'
            };
            STATE.stops.push(newStop);
            saveData();
            updateUI();
            closeModal();
            zoomToAll();
            showToast('नवीन थांबा यशस्वीरित्या जोडला गेला!');
        }

        function saveData() {
            localStorage.setItem('schoolBusStopsData', JSON.stringify(STATE.stops));
        }

        // --- Toast ---
        function showToast(msg, type) {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            if (type === 'error') t.classList.add('error');
            if (type === 'success') t.classList.add('success');
            t.innerHTML = `🔔 <span>${msg}</span>`;
            document.body.appendChild(t);
            setTimeout(() => { if (t.parentElement) t.remove(); }, 2800);
        }

        // ================================================================
        //  BACKUP & RESTORE (Export / Import) – unchanged
        // ================================================================
        const APP_STORAGE_KEYS = [
            'schoolBusStopsData',
            'schoolBusShift',
            'lastOpenedDate',
            'schoolBusMigrationCompleted'
        ];

        function exportBackup() {
            try {
                const backupPayload = {
                    version: '1.0',
                    exportedAt: new Date().toISOString(),
                    appName: 'SchoolBusTracker',
                    data: {}
                };
                APP_STORAGE_KEYS.forEach(key => {
                    const value = localStorage.getItem(key);
                    if (value !== null) {
                        try { backupPayload.data[key] = JSON.parse(value); } catch (_) { backupPayload.data[key] =
                            value; }
                    }
                });
                const jsonStr = JSON.stringify(backupPayload, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                const dateStr = new Date().toISOString().slice(0, 10);
                link.download = `bus_tracker_backup_${dateStr}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                setBackupStatus('success', '✅ बॅकअप घेतला');
                showToast('📤 बॅकअप फाईल यशस्वीरित्या डाउनलोड झाली!', 'success');
            } catch (e) {
                console.error('Export backup error:', e);
                setBackupStatus('error', '❌ बॅकअप अयशस्वी');
                showToast('बॅकअप घेताना त्रुटी आली: ' + e.message, 'error');
            }
        }

        function importBackup(event) {
            const fileInput = event.target;
            const file = fileInput.files[0];
            if (!file) return;
            fileInput.value = '';
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const backupData = JSON.parse(e.target.result);
                    if (!backupData.data || typeof backupData.data !== 'object') {
                        throw new Error('Invalid backup file: missing "data" object.');
                    }
                    const hasData = Object.keys(backupData.data).some(k => backupData.data[k] !== undefined && backupData
                        .data[k] !== null);
                    if (!hasData) {
                        showToast('⚠️ बॅकअप फाईलमध्ये कोणताही डेटा नाही.', 'error');
                        return;
                    }
                    if (!confirm(
                            'तुम्ही खात्रीने या बॅकअप फाईलमधून डेटा पुनर्संचयित करू इच्छिता?\n\n⚠️ सध्याचा सर्व डेटा ओव्हरराईट होईल!\n✅ तुमचा जुना डेटा हटणार नाही, तो या नवीन डेटाने बदलला जाईल.'
                            )) {
                        showToast('बॅकअप आयात रद्द केली.', 'error');
                        return;
                    }
                    let restoredCount = 0;
                    APP_STORAGE_KEYS.forEach(key => {
                        if (backupData.data.hasOwnProperty(key) && backupData.data[key] !== undefined && backupData
                            .data[key] !== null) {
                            const value = backupData.data[key];
                            if (typeof value === 'object') {
                                localStorage.setItem(key, JSON.stringify(value));
                            } else {
                                localStorage.setItem(key, String(value));
                            }
                            restoredCount++;
                        }
                    });
                    const restoredStops = localStorage.getItem('schoolBusStopsData');
                    if (restoredStops) {
                        try { STATE.stops = JSON.parse(restoredStops); } catch (_) { STATE.stops = []; }
                    }
                    const restoredShift = localStorage.getItem('schoolBusShift');
                    if (restoredShift) {
                        STATE.currentShift = restoredShift;
                        setShiftUI(restoredShift);
                    }
                    updateUI();
                    setBackupStatus('success', '✅ बॅकअप पुनर्संचयित');
                    showToast(`📥 ${restoredCount} आयटम यशस्वीरित्या पुनर्संचयित झाले!`, 'success');
                } catch (err) {
                    console.error('Import backup error:', err);
                    setBackupStatus('error', '❌ आयात अयशस्वी');
                    showToast('बॅकअप आयात करताना त्रुटी: ' + err.message, 'error');
                }
            };
            reader.onerror = function() {
                setBackupStatus('error', '❌ फाईल वाचता आली नाही');
                showToast('फाईल वाचताना त्रुटी आली.', 'error');
            };
            reader.readAsText(file);
        }

        // ================================================================
        //  UPLOAD TO CLOUD (push local data to Firebase)
        // ================================================================
        function uploadToBackend(dataToSend, callback) {
            const btn = document.getElementById('cloudUploadBtn');
            const originalHTML = btn.innerHTML;

            if (!firebaseInitialized) {
                let errMsg = '⚠️ Firebase उपलब्ध नाही. ';
                if (firebaseInitError) errMsg += 'कारण: ' + firebaseInitError;
                else errMsg += 'कृपया इंटरनेट कनेक्शन तपासा.';
                showToast(errMsg, 'error');
                setBackupStatus('error', '❌ Firebase नाही');
                if (callback) callback(false);
                return Promise.reject(new Error('Firebase not initialized'));
            }

            let stopsToUpload;
            if (dataToSend && Array.isArray(dataToSend)) {
                stopsToUpload = dataToSend;
            } else if (dataToSend && dataToSend.stops) {
                stopsToUpload = dataToSend.stops;
            } else {
                stopsToUpload = STATE.stops;
            }

            if (!stopsToUpload || stopsToUpload.length === 0) {
                showToast('📭 अपलोड करण्यासाठी कोणतेही थांबे नाहीत.', 'error');
                if (callback) callback(false);
                return Promise.reject(new Error('No stops to upload'));
            }

            setBackupStatus('syncing', `⏳ अपलोड (${stopsToUpload.length})...`);
            btn.disabled = true;
            btn.innerHTML = '<span class="btn-icon">⏳</span><span class="btn-label">अपलोड...</span>';

            const batchSize = 500;
            const batches = [];
            for (let i = 0; i < stopsToUpload.length; i += batchSize) {
                batches.push(stopsToUpload.slice(i, i + batchSize));
            }

            let uploadedCount = 0;
            let totalBatches = batches.length;
            let currentBatch = 0;

            function uploadBatch(batchStops) {
                return new Promise((resolve, reject) => {
                    const batch = firestore.batch();
                    const collectionRef = firestore.collection('stops');
                    batchStops.forEach(stop => {
                        const docRef = collectionRef.doc(stop.id);
                        const data = {
                            name: stop.name,
                            phone: stop.phone || '',
                            status: stop.status,
                            lat: stop.coords.lat,
                            lng: stop.coords.lng,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        batch.set(docRef, data, { merge: true });
                    });
                    const metaRef = firestore.collection('app_meta').doc('upload_status');
                    batch.set(metaRef, {
                        lastUploadTime: firebase.firestore.FieldValue.serverTimestamp(),
                        totalStops: stopsToUpload.length,
                        uploadedStops: firebase.firestore.FieldValue.increment(batchStops.length)
                    }, { merge: true });
                    batch.commit().then(() => {
                        uploadedCount += batchStops.length;
                        resolve();
                    }).catch(err => reject(err));
                });
            }

            let promiseChain = Promise.resolve();
            batches.forEach((chunk, idx) => {
                promiseChain = promiseChain.then(() => {
                    currentBatch = idx + 1;
                    setBackupStatus('syncing', `⏳ अपलोड ${currentBatch}/${totalBatches}...`);
                    return uploadBatch(chunk);
                });
            });

            return promiseChain
                .then(() => {
                    setBackupStatus('success', `✅ ${uploadedCount} थांबे अपलोड`);
                    showToast(`☁️ ${uploadedCount} थांबे यशस्वीरित्या क्लाउडवर पाठवले गेले!`, 'success');
                    if (callback) callback(true, { uploaded: uploadedCount });
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                    return { uploaded: uploadedCount };
                })
                .catch(err => {
                    console.error('❌ Upload error:', err);
                    setBackupStatus('error', '❌ अपलोड अयशस्वी');
                    let msg = 'क्लाउडवर पाठवताना त्रुटी. ';
                    if (err.message) {
                        msg += err.message;
                        if (err.message.includes('permission')) {
                            msg += ' (कृपया Firestore security rules तपासा)';
                        } else if (err.message.includes('network')) {
                            msg += ' (इंटरनेट कनेक्शन तपासा)';
                        }
                    } else {
                        msg += 'कृपया इंटरनेट कनेक्शन तपासा.';
                    }
                    showToast('⚠️ ' + msg, 'error');
                    if (callback) callback(false, err);
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                    throw err;
                });
        }

        // ================================================================
        //  SYNC FROM CLOUD (pull data from Firebase to local)
        //  This is the NEW function that makes data visible on other phones
        // ================================================================

        /**
         * syncFromCloud - Fetches all stops from Firestore and updates localStorage.
         * This makes data uploaded by one device visible on another.
         * - If local has no data, it auto-fills.
         * - If local has data, it asks the user before overwriting.
         * - Returns a Promise that resolves with the number of stops synced.
         */
        function syncFromCloud(showToastMessage = true) {
            if (!firebaseInitialized) {
                let errMsg = '⚠️ Firebase उपलब्ध नाही. ';
                if (firebaseInitError) errMsg += 'कारण: ' + firebaseInitError;
                else errMsg += 'कृपया इंटरनेट कनेक्शन तपासा.';
                if (showToastMessage) showToast(errMsg, 'error');
                setBackupStatus('error', '❌ Firebase नाही');
                return Promise.reject(new Error('Firebase not initialized'));
            }

            const syncBtn = document.getElementById('syncBtn');
            const originalHTML = syncBtn.innerHTML;

            // Check if local data exists
            const localData = localStorage.getItem('schoolBusStopsData');
            let localStops = [];
            if (localData) {
                try { localStops = JSON.parse(localData); } catch (_) { localStops = []; }
            }

            // If local has data, ask for confirmation before overwriting
            if (localStops.length > 0 && showToastMessage) {
                if (!confirm(
                        '⚠️ तुमच्या फोनवर आधीच ' + localStops.length + ' थांबे आहेत.\n\n' +
                        'क्लाउडवरून डेटा आणल्यास हा सर्व स्थानिक डेटा ओव्हरराईट होईल.\n\n' +
                        'तुम्हाला खात्री आहे का?'
                    )) {
                    showToast('सिंक रद्द केली.', 'error');
                    return Promise.reject(new Error('Sync cancelled by user'));
                }
            }

            setBackupStatus('syncing', '⏳ क्लाउडवरून आणत आहे...');
            syncBtn.disabled = true;
            syncBtn.innerHTML = '<span class="btn-icon">⏳</span><span class="btn-label">आणत आहे...</span>';

            // Fetch all documents from 'stops' collection
            return firestore.collection('stops').get()
                .then((querySnapshot) => {
                    const cloudStops = [];
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        // Reconstruct the stop object with coords
                        cloudStops.push({
                            id: doc.id,
                            name: data.name || 'अज्ञात थांबा',
                            phone: data.phone || '',
                            status: data.status || 'pending',
                            coords: {
                                lat: data.lat || 0,
                                lng: data.lng || 0
                            }
                        });
                    });

                    if (cloudStops.length === 0) {
                        setBackupStatus('cloud', '☁️ क्लाउडवर कोणताही डेटा नाही');
                        if (showToastMessage) showToast('📭 क्लाउडवर कोणतेही थांबे नाहीत.', 'error');
                        syncBtn.disabled = false;
                        syncBtn.innerHTML = originalHTML;
                        return { synced: 0 };
                    }

                    // Update localStorage with cloud data
                    localStorage.setItem('schoolBusStopsData', JSON.stringify(cloudStops));
                    // Update STATE
                    STATE.stops = cloudStops;

                    // Also update shift if present in meta
                    firestore.collection('app_meta').doc('upload_status').get()
                        .then((metaDoc) => {
                            if (metaDoc.exists && metaDoc.data().shift) {
                                const shift = metaDoc.data().shift;
                                localStorage.setItem('schoolBusShift', shift);
                                STATE.currentShift = shift;
                                setShiftUI(shift);
                            }
                        })
                        .catch(() => { /* ignore meta errors */ });

                    // Refresh UI
                    updateUI();
                    setBackupStatus('success', `✅ ${cloudStops.length} थांबे सिंक झाले`);
                    if (showToastMessage) {
                        showToast(`🔄 ${cloudStops.length} थांबे क्लाउडवरून यशस्वीरित्या आणले गेले!`, 'success');
                    }
                    syncBtn.disabled = false;
                    syncBtn.innerHTML = originalHTML;
                    return { synced: cloudStops.length };
                })
                .catch((err) => {
                    console.error('❌ Sync error:', err);
                    setBackupStatus('error', '❌ सिंक अयशस्वी');
                    let msg = 'क्लाउडवरून डेटा आणताना त्रुटी. ';
                    if (err.message) {
                        msg += err.message;
                        if (err.message.includes('permission')) {
                            msg += ' (कृपया Firestore security rules तपासा)';
                        } else if (err.message.includes('network')) {
                            msg += ' (इंटरनेट कनेक्शन तपासा)';
                        }
                    } else {
                        msg += 'कृपया इंटरनेट कनेक्शन तपासा.';
                    }
                    if (showToastMessage) showToast('⚠️ ' + msg, 'error');
                    syncBtn.disabled = false;
                    syncBtn.innerHTML = originalHTML;
                    throw err;
                });
        }

        /**
         * autoSyncFromCloud - Called on app launch.
         * Only auto-syncs if local has NO data (fresh install) or if the user
         * has explicitly allowed it via the flag.
         * This avoids accidental data loss on launch.
         */
        function autoSyncFromCloud() {
            // Check if local has data
            const localData = localStorage.getItem('schoolBusStopsData');
            let localStops = [];
            if (localData) {
                try { localStops = JSON.parse(localData); } catch (_) { localStops = []; }
            }

            // Only auto-sync if local is empty (fresh install on new device)
            if (localStops.length === 0) {
                console.log('🔄 Auto-sync: No local data, pulling from cloud...');
                setBackupStatus('syncing', '⏳ क्लाउडवरून आणत आहे...');
                syncFromCloud(false)
                    .then((result) => {
                        if (result.synced > 0) {
                            showToast(`🔄 ${result.synced} थांबे क्लाउडवरून आपोआप आणले गेले!`, 'success');
                        }
                    })
                    .catch(() => {
                        // Silent fail for auto-sync
                        console.log('Auto-sync failed (silent).');
                        setBackupStatus('error', '⚠️ ऑटो-सिंक अयशस्वी');
                    });
            } else {
                console.log('📱 Local data exists (' + localStops.length + ' stops). Skipping auto-sync.');
                // Still check cloud count and show a hint if cloud has more data
                if (firebaseInitialized) {
                    firestore.collection('stops').get()
                        .then((snapshot) => {
                            const cloudCount = snapshot.size;
                            if (cloudCount > localStops.length) {
                                setBackupStatus('cloud',
                                    `☁️ क्लाउडवर ${cloudCount} थांबे (${localStops.length} स्थानिक) — "सिंक करा" दाबा`);
                            } else {
                                setBackupStatus('success', `✅ ${localStops.length} थांबे`);
                            }
                        })
                        .catch(() => {
                            setBackupStatus('success', `✅ ${localStops.length} थांबे`);
                        });
                }
            }
        }

        // ================================================================
        //  MIGRATION SYSTEM
        // ================================================================

        const MIGRATION_KEY = 'schoolBusMigrationCompleted';

        function runMigration() {
            return new Promise((resolve, reject) => {
                const migrationDone = localStorage.getItem(MIGRATION_KEY);
                if (migrationDone === 'true') {
                    setBackupStatus('success', '✅ सर्व व्यवस्थित');
                    resolve();
                    return;
                }

                const stopsData = localStorage.getItem('schoolBusStopsData');
                if (!stopsData) {
                    localStorage.setItem(MIGRATION_KEY, 'true');
                    setBackupStatus('success', '✅ सर्व व्यवस्थित');
                    resolve();
                    return;
                }

                let stops;
                try { stops = JSON.parse(stopsData); } catch (_) { stops = []; }
                if (!Array.isArray(stops) || stops.length === 0) {
                    localStorage.setItem(MIGRATION_KEY, 'true');
                    setBackupStatus('success', '✅ सर्व व्यवस्थित');
                    resolve();
                    return;
                }

                setBackupStatus('syncing', '⏳ मायग्रेशन चालू आहे...');
                console.log(`🔄 Migration: uploading ${stops.length} stops to Firebase...`);

                if (!firebaseInitialized) {
                    setBackupStatus('error', '⚠️ Firebase नाही, पुन्हा प्रयत्न करा');
                    resolve(); // Don't block, retry next time
                    return;
                }

                uploadToBackend(stops, (success, result) => {
                    if (success) {
                        localStorage.setItem(MIGRATION_KEY, 'true');
                        setBackupStatus('success', '✅ मायग्रेशन पूर्ण');
                        showToast(`✅ ${stops.length} थांबे क्लाउडवर बॅकअप झाले!`, 'success');
                        console.log('✅ Migration completed.');
                        resolve();
                    } else {
                        setBackupStatus('error', '⚠️ मायग्रेशन अयशस्वी, पुन्हा प्रयत्न करा');
                        console.warn('Migration failed. Will retry.');
                        resolve(); // Resolve anyway, app continues
                    }
                });
            });
        }

        // Helper to update status badge
        function setBackupStatus(type, message) {
            const el = document.getElementById('backupStatus');
            if (!el) return;
            el.className = 'backup-status';
            if (type === 'success') el.classList.add('success');
            else if (type === 'error') el.classList.add('error');
            else if (type === 'syncing') el.classList.add('syncing');
            else if (type === 'cloud') el.classList.add('cloud');
            el.textContent = message;
        }

        // ================================================================
        //  BOOT
        // ================================================================

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
