
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>मराठी बस ट्रॅकर</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #2979ff;
            --primary-dark: #1565c0;
            --primary-light: #e3f2fd;
            --surface: #1e1e24; /* Darker modern theme for extreme contrast */
            --background: #121214;
            --green: #00e676;
            --green-light: rgba(0, 230, 118, 0.15);
            --orange: #ff9100;
            --orange-light: rgba(255, 145, 0, 0.15);
            --red: #ff1744;
            --grey: #b0bec5;
            --text: #ffffff;
            --text-secondary: #cfd8dc;
            --border: #37474f;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-lg: 0 12px 36px rgba(0,0,0,0.5);
            --radius: 20px;
            --radius-sm: 12px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: calc(var(--safe-bottom) + 100px);
        }

        /* --- Header --- */
        .header {
            background: var(--surface);
            padding: 14px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }
        .header .logo-area { display: flex; align-items: center; gap: 10px; }
        .header .logo { font-size: 28px; }
        .header .title h1 { font-size: 1.2rem; font-weight: 800; color: #ffd600; }
        .header .title p { font-size: 0.8rem; color: var(--text-secondary); }
        
        /* Shift Mode Switcher */
        .shift-toggle {
            display: flex;
            background: #263238;
            border-radius: 30px;
            padding: 4px;
            border: 1px solid var(--border);
        }
        .shift-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            background: transparent;
            color: var(--grey);
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .shift-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow);
        }

        /* --- Summary Cards (High Contrast) --- */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 16px;
        }
        .summary-card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 12px 8px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 2px solid var(--border);
        }
        .summary-card .value { font-size: 2.2rem; font-weight: 900; line-height: 1; }
        .summary-card .label { font-size: 0.75rem; color: var(--text-secondary); font-weight: bold; margin-top: 6px; }
        .summary-card.total .value { color: #ffd600; }
        .summary-card.done .value { color: var(--green); }
        .summary-card.left .value { color: var(--orange); }

        /* --- Map Area --- */
        .map-container {
            margin: 0 16px 16px;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            height: 35vh;
            min-height: 240px;
            position: relative;
            border: 3px solid var(--border);
        }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        .map-overlay-btns {
            position: absolute;
            top: 12px; right: 12px;
            z-index: 10;
            display: flex; flex-direction: column; gap: 10px;
        }
        .map-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--border);
            box-shadow: var(--shadow);
            font-size: 1.4rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: white;
        }
        .map-btn:active { transform: scale(0.9); background: #263238; }
        
        .gps-status {
            position: absolute;
            bottom: 12px; left: 12px; right: 12px;
            background: rgba(30, 30, 36, 0.95);
            border-radius: 12px; padding: 10px 14px;
            font-size: 0.85rem; font-weight: bold;
            box-shadow: var(--shadow);
            z-index: 10;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid var(--border);
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--grey); }
        .dot.active { background: var(--green); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,230,118,0.5); } 70% { box-shadow: 0 0 0 10px rgba(0,230,118,0); } 100% { box-shadow: 0 0 0 0 rgba(0,230,118,0); } }

        /* --- Stops List --- */
        .list-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 10px;
        }
        .list-header { font-weight: 800; font-size: 1.2rem; color: #ffd600; }
        .reset-btn-manual {
            background: #263238;
            color: #ff5252;
            border: 1px solid #ff5252;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }

        .stops-list { padding: 0 16px; display: flex; flex-direction: column; gap: 14px; }
        
        /* Card visual styles for driver readability */
        .stop-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            border: 2px solid var(--border);
            border-left: 10px solid var(--orange); /* Clear thick color line */
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: all 0.25s;
        }
        
        /* NEXT/ACTIVE STOP Pulsing & Highlight */
        .stop-card.active-next {
            border-left-color: #ffd600;
            border-top: 2px solid #ffd600;
            border-right: 2px solid #ffd600;
            border-bottom: 2px solid #ffd600;
            background: #263238;
            animation: cardPulse 3s infinite alternate;
        }
        @keyframes cardPulse {
            0% { box-shadow: 0 4px 12px rgba(255, 214, 0, 0.1); }
            100% { box-shadow: 0 4px 20px rgba(255, 214, 0, 0.3); }
        }

        .stop-card.done {
            border-left-color: var(--green);
            background: var(--green-light);
            border-top: 1px solid rgba(0, 230, 118, 0.3);
            border-right: 1px solid rgba(0, 230, 118, 0.3);
            border-bottom: 1px solid rgba(0, 230, 118, 0.3);
            opacity: 0.65;
        }
        
        .stop-info { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .stop-name-row { display: flex; align-items: center; gap: 8px; }
        .stop-badge {
            background: var(--border);
            color: #ffd600;
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900;
            font-size: 0.9rem;
        }
        .stop-card.done .stop-badge { background: var(--green); color: black; }
        
        .stop-name { font-size: 1.3rem; font-weight: 800; color: white; }
        .stop-card.done .stop-name { text-decoration: line-through; color: var(--grey); }
        
        .stop-details {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .dist-badge {
            background: rgba(41, 121, 255, 0.2);
            color: #82b1ff;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: bold;
        }
        .stop-card.done .dist-badge { display: none; }

        /* Actions: Big tap targets */
        .stop-action-btns {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Direct Big Call Button */
        .call-btn {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #37474f;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            color: #81d4fa;
            cursor: pointer;
            text-decoration: none;
        }
        .call-btn:active { background: #455a64; }

        /* Direction button */
        .dir-btn {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            color: white;
            border: none;
            cursor: pointer;
        }
        .dir-btn:active { background: var(--primary-dark); }

        /* The Ultimate BIG TICK button */
        .tick-btn {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: var(--green);
            color: black;
            font-size: 1.8rem;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 230, 118, 0.4);
        }
        .tick-btn:active { transform: scale(0.9); }
        
        .already-done-check {
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem;
            color: var(--green);
        }

        /* Danger Delete Quick Button */
        .del-btn-quick {
            background: transparent;
            border: none;
            color: #ff5252;
            padding: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-left: 8px;
        }

        /* --- FAB Button --- */
        .fab {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 20px);
            right: 20px;
            width: 65px; height: 65px;
            border-radius: 50%;
            background: #ffd600;
            color: black; font-size: 2.5rem; font-weight: bold;
            border: none; box-shadow: 0 6px 18px rgba(255,214,0,0.4);
            z-index: 500; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .fab:active { transform: scale(0.9); }

        /* --- Modal (Fixed overlap using z-index 99999) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 99999; /* Higher than map, overlay, etc. */
            display: none; align-items: flex-end; justify-content: center;
        }
        .modal-sheet {
            background: var(--surface); width: 100%; max-width: 600px;
            border-radius: 30px 30px 0 0; padding: 24px 20px calc(var(--safe-bottom) + 24px);
            animation: slideUp 0.3s ease-out forwards;
            border-top: 4px solid var(--primary);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-title { font-size: 1.4rem; margin-bottom: 20px; color: #ffd600; font-weight: 800; text-align: center;}
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: bold; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input {
            width: 100%; padding: 14px 16px; border-radius: 14px;
            border: 2px solid var(--border); font-size: 1.1rem; outline: none;
            background: #263238; color: white;
        }
        .form-input:focus { border-color: var(--primary); }
        
        .fetch-btn {
            width: 100%; padding: 16px; border-radius: 14px;
            background: rgba(41, 121, 255, 0.15); color: #82b1ff; border: 2px dashed var(--primary);
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .fetch-btn.success { background: var(--green-light); border-color: var(--green); color: var(--green); }
        
        .modal-actions { display: flex; gap: 14px; margin-top: 28px; }
        .btn-cancel { background: #37474f; color: white; flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; flex: 2; padding: 16px; border-radius: 14px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        /* --- Toast --- */
        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            background: #ffd600; color: black; padding: 14px 28px;
            border-radius: 30px; font-size: 1rem; z-index: 100000;
            font-weight: 800; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            animation: fadeInOut 2.8s forwards; pointer-events: none;
            display: flex; align-items: center; gap: 8px;
        }
        @keyframes fadeInOut { 0% { opacity:0; top:0; } 15% { opacity:1; top:24px; } 85% { opacity:1; top:24px; } 100% { opacity:0; top:0; } }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="logo-area">
            <div class="logo">🏫</div>
            <div class="title">
                <h1>स्कूल बस ट्रॅकर</h1>
                <p id="liveDate">दिनांक लोड होत आहे...</p>
            </div>
        </div>
        
        <!-- Morning / Afternoon Shift Switcher -->
        <div class="shift-toggle">
            <button class="shift-btn active" id="btnMorning" onclick="setShift('morning')">
                ☀️ सकाळ
            </button>
            <button class="shift-btn" id="btnAfternoon" onclick="setShift('afternoon')">
                🌙 दुपार
            </button>
        </div>
    </header>

    <!-- Summary (High Contrast Displays) -->
    <div class="summary-row">
        <div class="summary-card total">
            <div class="value" id="countTotal">0</div>
            <div class="label">एकूण थांबे</div>
        </div>
        <div class="summary-card done">
            <div class="value" id="countDone">0</div>
            <div class="label">पूर्ण झाले</div>
        </div>
        <div class="summary-card left">
            <div class="value" id="countLeft">0</div>
            <div class="label">उरलेले</div>
        </div>
    </div>

    <!-- Map -->
    <div class="map-container">
        <div id="map"></div>
        <div class="map-overlay-btns">
            <button class="map-btn" onclick="recenterMap()" title="माझी जागा">📍</button>
            <button class="map-btn" onclick="zoomToAll()" title="पूर्ण मार्ग">🔍</button>
        </div>
        <div class="gps-status">
            <div class="dot" id="gpsIndicator"></div>
            <span id="gpsText">जीपीएस (GPS) शोधत आहे...</span>
        </div>
    </div>

    <!-- Stops List Header -->
    <div class="list-header-row">
        <div class="list-header" id="listTitleLabel">सकाळचे थांबे (घरून शाळा):</div>
        <button class="reset-btn-manual" onclick="confirmManualReset()">🔄 रीसेट करा</button>
    </div>
    
    <!-- Stops List Container -->
    <div class="stops-list" id="stopsList">
        <!-- Javascript द्वारे थांबे येथे दिसतील -->
    </div>

    <!-- Add Stop Button (FAB) -->
    <button class="fab" onclick="openModal()" title="नवीन थांबा जोडा">+</button>

    <!-- Add Stop Modal Overlay -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-sheet">
            <h2 class="modal-title">नवीन थांबा जोडा 📍</h2>
            
            <div class="form-group">
                <label>विद्यार्थ्यांचे / थांब्याचे नाव लिहा *</label>
                <input type="text" id="stopNameInput" class="form-input" placeholder="उदा. राहुल शिंदे, पिंपरी" required>
            </div>

            <div class="form-group">
                <label>पालकांचा मोबाईल नंबर (ऐच्छिक)</label>
                <input type="tel" id="stopPhoneInput" class="form-input" placeholder="उदा. 98XXXXXXXX">
            </div>

            <div class="form-group">
                <label>थांब्याची जागा (Location) सेट करा</label>
                <p style="font-size: 0.8rem; color: var(--grey); margin-bottom: 8px;">
                    * टीप: या थांब्याच्या ठिकाणी उभे राहून खालील बटण दाबा.
                </p>
                <button type="button" id="btnFetchLocation" class="fetch-btn" onclick="fetchAndSaveTempLocation()">
                    📍 माझी चालू जागा इथेच सेट करा
                </button>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal()">मागे व्हा</button>
                <button type="button" class="btn-save" onclick="saveNewStop()">✅ थांबा सेव्ह करा</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- State Management ---
        const STATE = {
            stops: [],
            driverPos: null,      // Driver's active GPS coordinate
            tempCoords: null,     // Holds coordinate when adding/marking new stops
            currentShift: 'morning', // morning (pickup) or afternoon (drop-off)
            map: null,
            markerLayer: null,
            driverMarker: null,
            routeLine: null
        };

        // --- Init & Auto Daily Reset Logic ---
        function initApp() {
            // Load saved stops
            const saved = localStorage.getItem('schoolBusStopsData');
            if (saved) {
                STATE.stops = JSON.parse(saved);
            }

            // Set Shift Mode
            const savedShift = localStorage.getItem('schoolBusShift');
            if (savedShift) {
                STATE.currentShift = savedShift;
                setShiftUI(savedShift);
            }

            // Set Current Date & Check for Daily Reset
            const now = new Date();
            const dateStr = now.toLocaleDateString('mr-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('liveDate').textContent = dateStr;

            checkDailyReset();

            // Setup Leaflet Map
            initMap();
            
            // Start GPS Watcher
            startGPS();

            // Draw everything
            updateUI();
        }

        // AUTO RESET: If next day, reset all stops' completed status to 'pending'
        function checkDailyReset() {
            const todayKey = new Date().toDateString(); // e.g. "Tue Jul 07 2026"
            const lastSavedDate = localStorage.getItem('lastOpenedDate');

            if (lastSavedDate && lastSavedDate !== todayKey) {
                // Change of day detected! Reset all stop statuses
                STATE.stops.forEach(stop => {
                    stop.status = 'pending';
                });
                localStorage.setItem('schoolBusStopsData', JSON.stringify(STATE.stops));
                showToast("🌅 शुभ सकाळ! आजचे सर्व थांबे आपोआप रीसेट झाले आहेत.");
            }
            
            // Save today's date as last opened
            localStorage.setItem('lastOpenedDate', todayKey);
        }

        // Manual Force Reset
        function confirmManualReset() {
            if (confirm("तुम्हाला आजचे सर्व थांबे पुन्हा सुरूवातीपासून (Pending) करायचे आहेत का?")) {
                STATE.stops.forEach(stop => {
                    stop.status = 'pending';
                });
                saveData();
                updateUI();
                showToast("🔄 सर्व थांबे यशस्वीरित्या रीसेट झाले!");
            }
        }

        // Shift Toggle (Sakal / Dupar)
        function setShift(shiftMode) {
            STATE.currentShift = shiftMode;
            localStorage.setItem('schoolBusShift', shiftMode);
            setShiftUI(shiftMode);
            updateUI();
            showToast(shiftMode === 'morning' ? "☀️ सकाळची शिफ्ट निवडली" : "🌙 दुपारची शिफ्ट निवडली");
        }

        function setShiftUI(shiftMode) {
            const morningBtn = document.getElementById('btnMorning');
            const afternoonBtn = document.getElementById('btnAfternoon');
            const label = document.getElementById('listTitleLabel');

            if (shiftMode === 'morning') {
                morningBtn.classList.add('active');
                afternoonBtn.classList.remove('active');
                label.textContent = "सकाळचे थांबे (घरून शाळा):";
            } else {
                afternoonBtn.classList.add('active');
                morningBtn.classList.remove('active');
                label.textContent = "दुपारचे थांबे (शाळेतून घरी):";
            }
        }

        // --- Map Logic ---
        function initMap() {
            // Default center Pimpri/Pune area if GPS not loaded yet
            STATE.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([18.6279, 73.8009], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(STATE.map);
            STATE.markerLayer = L.layerGroup().addTo(STATE.map);
        }

        function updateMapElements() {
            if (!STATE.map) return;
            STATE.markerLayer.clearLayers();
            if (STATE.routeLine) STATE.map.removeLayer(STATE.routeLine);

            const points = [];

            // Add Driver (Bus) Marker
            if (STATE.driverPos) {
                points.push([STATE.driverPos.lat, STATE.driverPos.lng]);
                
                // Pulsing outer blue radius
                L.circle([STATE.driverPos.lat, STATE.driverPos.lng], {
                    radius: 30, color: '#2979ff', fillColor: '#2979ff', fillOpacity: 0.2, weight: 1
                }).addTo(STATE.markerLayer);

                STATE.driverMarker = L.circleMarker([STATE.driverPos.lat, STATE.driverPos.lng], {
                    radius: 9, color: 'white', weight: 3, fillColor: '#2979ff', fillOpacity: 1
                }).addTo(STATE.markerLayer).bindPopup("<b>🚌 तुमची बस इथे आहे</b>");
            }

            // Determine rendering order based on morning/afternoon shift direction
            const displayStops = [...STATE.stops];
            if (STATE.currentShift === 'afternoon') {
                // Afternoon route is reversed (school to home drop-off)
                displayStops.reverse();
            }

            // Plot stops
            displayStops.forEach((stop, i) => {
                const isDone = stop.status === 'completed';
                const color = isDone ? '#9aa0a6' : (i === getNextPendingIndex(displayStops) ? '#ffd600' : '#ff9100');
                
                const iconHtml = `<div style="background:${color};color:black;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;border:2px solid white;box-shadow:0 3px 6px rgba(0,0,0,0.4);font-size:0.9rem">${i+1}</div>`;
                const icon = L.divIcon({ className: '', html: iconHtml, iconSize: [30,30], iconAnchor: [15,15] });
                
                L.marker([stop.coords.lat, stop.coords.lng], { icon: icon })
                 .addTo(STATE.markerLayer)
                 .bindPopup(`<b>${stop.name}</b><br>${isDone ? 'झाला ✔' : 'बाकी ⏳'}`);

                if (!isDone) {
                    points.push([stop.coords.lat, stop.coords.lng]);
                }
            });

            // Draw route polyline matching driver's trip schedule
            if (points.length > 1) {
                STATE.routeLine = L.polyline(points, { color: '#ffd600', weight: 5, dashArray: '8, 8', opacity: 0.8 }).addTo(STATE.map);
            }
        }

        function getNextPendingIndex(orderedList) {
            return orderedList.findIndex(s => s.status === 'pending');
        }

        function recenterMap() {
            if (STATE.driverPos && STATE.map) {
                STATE.map.setView([STATE.driverPos.lat, STATE.driverPos.lng], 16);
            } else {
                showToast("जीपीएस सिग्नल मिळेपर्यंत थांबा...");
            }
        }

        function zoomToAll() {
            if (!STATE.map || STATE.stops.length === 0) return;
            const bounds = [];
            if(STATE.driverPos) bounds.push([STATE.driverPos.lat, STATE.driverPos.lng]);
            STATE.stops.forEach(s => bounds.push([s.coords.lat, s.coords.lng]));
            if(bounds.length > 0) STATE.map.fitBounds(bounds, { padding: [40, 40] });
        }

        // --- GPS Tracker Logic ---
        function startGPS() {
            const ind = document.getElementById('gpsIndicator');
            const txt = document.getElementById('gpsText');

            if (!navigator.geolocation) {
                txt.textContent = "मोबाईलमध्ये GPS सपोर्ट नाही.";
                return;
            }

            navigator.geolocation.watchPosition(
                (pos) => {
                    STATE.driverPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    ind.className = 'dot active';
                    txt.textContent = "जीपीएस कनेक्टेड 🟢 (चालू जागा)";
                    updateMapElements();
                    updateListDistances();
                },
                (err) => {
                    ind.className = 'dot';
                    txt.textContent = "GPS बंद आहे! कृपया Location चालू करा 🔴";
                    console.error(err);
                },
                { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
            );
        }

        // Haversine Distance (m / km)
        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371; // km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const d = R * c;
            return d < 1 ? Math.round(d * 1000) + ' मी' : d.toFixed(1) + ' किमी';
        }

        // --- High Contrast Driver UI Rendering ---
        function updateUI() {
            const total = STATE.stops.length;
            const done = STATE.stops.filter(s => s.status === 'completed').length;
            
            document.getElementById('countTotal').textContent = total;
            document.getElementById('countDone').textContent = done;
            document.getElementById('countLeft').textContent = total - done;

            const listDiv = document.getElementById('stopsList');
            listDiv.innerHTML = '';

            if (total === 0) {
                listDiv.innerHTML = `
                    <div style="text-align:center; padding: 40px 20px; color: var(--grey); background: var(--surface); border-radius: var(--radius); border: 2px dashed var(--border);">
                        <p style="font-size: 1.2rem; font-weight: bold; margin-bottom: 8px;">एकूण शून्य थांबे</p>
                        <p style="font-size: 0.9rem;">नवीन थांबा जोडण्यासाठी खालील पिवळे (+) बटण दाबा.</p>
                    </div>
                `;
                updateMapElements();
                return;
            }

            // Create display sequence based on Morning vs Afternoon (reversed drop-off)
            const displayStops = [...STATE.stops];
            if (STATE.currentShift === 'afternoon') {
                displayStops.reverse();
            }

            // Find first pending index to highlight
            const nextPendingIndex = getNextPendingIndex(displayStops);

            displayStops.forEach((stop, index) => {
                const isDone = stop.status === 'completed';
                const isNext = (index === nextPendingIndex); // Highlight Active Destination
                
                const distStr = (STATE.driverPos && !isDone) ? 
                    calcDist(STATE.driverPos.lat, STATE.driverPos.lng, stop.coords.lat, stop.coords.lng) : '--';
                
                const card = document.createElement('div');
                card.className = `stop-card ${isDone ? 'done' : ''} ${isNext ? 'active-next' : ''}`;
                
                // Determine direction marker icon
                const travelIcon = STATE.currentShift === 'morning' ? '🏠 ➔ 🏫' : '🏫 ➔ 🏠';

                // Large action layout
                let actionBtnHTML = '';
                if (!isDone) {
                    actionBtnHTML = `
                        <div class="stop-action-btns">
                            ${stop.phone ? `<a href="tel:${stop.phone}" class="call-btn" title="फोन लावा">📞</a>` : ''}
                            <button class="dir-btn" onclick="openNavMap(${stop.coords.lat}, ${stop.coords.lng})" title="नकाशा मार्ग">🧭</button>
                            <button class="tick-btn" onclick="markDone('${stop.id}')" title="पूर्ण झाले">✔</button>
                        </div>
                    `;
                } else {
                    actionBtnHTML = `
                        <div class="stop-action-btns">
                            <div class="already-done-check">✔</div>
                            <button class="del-btn-quick" onclick="deleteStop('${stop.id}')" title="डिलीट">🗑️</button>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="stop-info">
                        <div class="stop-name-row">
                            <div class="stop-badge">${index + 1}</div>
                            <div class="stop-name">${stop.name}</div>
                        </div>
                        <div class="stop-details">
                            <span class="dist-badge class-dist" data-lat="${stop.coords.lat}" data-lng="${stop.coords.lng}">
                                📍 ${distStr} लांब
                            </span>
                            <span style="color: var(--grey); font-weight: bold; font-size: 0.8rem;">
                                ${travelIcon}
                            </span>
                        </div>
                    </div>
                    ${actionBtnHTML}
                `;
                listDiv.appendChild(card);
            });

            updateMapElements();
        }

        // Lightweight live GPS updates for distances to save battery & processing
        function updateListDistances() {
            if (!STATE.driverPos) return;
            document.querySelectorAll('.class-dist').forEach(el => {
                const lat = parseFloat(el.getAttribute('data-lat'));
                const lng = parseFloat(el.getAttribute('data-lng'));
                el.textContent = `📍 ${calcDist(STATE.driverPos.lat, STATE.driverPos.lng, lat, lng)} लांब`;
            });
        }

        // --- Stop Operations ---
        function openNavMap(lat, lng) {
            // High reliability redirect to native system navigation mapping tools
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`, '_blank');
        }

        function markDone(id) {
            const stop = STATE.stops.find(s => s.id === id);
            if (stop) {
                stop.status = 'completed';
                saveData();
                updateUI();
                showToast(`मस्त! ${stop.name} थांबा पूर्ण झाला.`);
            }
        }

        function deleteStop(id) {
            const stop = STATE.stops.find(s => s.id === id);
            const stopName = stop ? stop.name : "हा थांबा";
            if (confirm(`तुम्हाला नक्की '${stopName}' या विद्यार्थ्याचा मार्ग हटवायचा आहे का?`)) {
                STATE.stops = STATE.stops.filter(s => s.id !== id);
                saveData();
                updateUI();
                showToast("थांबा यशस्वीरित्या डिलीट केला.");
            }
        }

        // --- Modal Control Flow ---
        function openModal() {
            document.getElementById('stopNameInput').value = '';
            document.getElementById('stopPhoneInput').value = '';
            STATE.tempCoords = null;
            
            const btn = document.getElementById('btnFetchLocation');
            btn.className = 'fetch-btn';
            btn.innerHTML = '📍 माझी चालू जागा इथेच सेट करा';
            
            document.getElementById('addModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('addModal').style.display = 'none';
        }

        // GEOLOCATION ACTION: Save the exact spot where driver currently stands
        function fetchAndSaveTempLocation() {
            if (!STATE.driverPos) {
                showToast('थांबा! अजून जीपीएस लोकेशन मिळाले नाही.');
                return;
            }
            
            // Lock location data in state
            STATE.tempCoords = { ...STATE.driverPos };
            
            // Visual confirmation inside modal
            const btn = document.getElementById('btnFetchLocation');
            btn.className = 'fetch-btn success';
            btn.innerHTML = '✅ जागा यशस्वीरित्या सेट झाली!';
            
            showToast('तुम्ही उभे असलेली जागा रेकॉर्ड केली आहे.');
        }

        function saveNewStop() {
            const name = document.getElementById('stopNameInput').value.trim();
            const phone = document.getElementById('stopPhoneInput').value.trim();
            
            if (!name) {
                showToast('कृपया विद्यार्थ्याचे किंवा थांब्याचे नाव लिहा!');
                return;
            }
            if (!STATE.tempCoords) {
                showToast('कृपया "माझी चालू जागा सेट करा" वर क्लिक करा!');
                return;
            }

            const newStop = {
                id: Date.now().toString(),
                name: name,
                phone: phone,
                coords: STATE.tempCoords,
                status: 'pending' // pending, completed
            };

            STATE.stops.push(newStop);
            saveData();
            updateUI();
            closeModal();
            zoomToAll();
            showToast('नवीन थांबा यशस्वीरित्या जोडला गेला!');
        }

        // --- Local Storage Utils ---
        function saveData() {
            localStorage.setItem('schoolBusStopsData', JSON.stringify(STATE.stops));
        }

        function showToast(msg) {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `🔔 <span>${msg}</span>`;
            document.body.appendChild(t);
            
            setTimeout(() => { if (t.parentElement) t.remove(); }, 2800);
        }

        // Document Load Initializer
        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
